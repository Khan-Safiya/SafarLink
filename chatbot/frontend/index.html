<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Route Navigator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0d;
      --surface: #1a1a1a;
      --border:  #2e2e2e;
      --muted:   #555;
      --sub:     #888;
      --text:    #e8e8e8;
      --accent:  #d4d4d4;
      --white:   #ffffff;
      --radius:  8px;
    }

    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    #app { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: 400px; min-width: 340px; max-width: 420px;
      display: flex; flex-direction: column;
      background: var(--surface); border-right: 1px solid var(--border);
      overflow: hidden;
    }

    #sidebar-header {
      padding: 20px 18px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #sidebar-header h1 { font-size: 17px; font-weight: 700; color: var(--white); letter-spacing: -0.3px; }
    #sidebar-header p  { font-size: 11px; color: var(--sub); margin-top: 2px; }

    #query-form { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    #query-input {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: var(--radius); background: var(--bg); color: var(--text);
      font-size: 13px; outline: none; transition: border 0.2s;
    }
    #query-input:focus  { border-color: var(--sub); }
    #query-input::placeholder { color: var(--muted); }

    #form-row { display: flex; gap: 8px; }
    .btn {
      flex: 1; padding: 9px 12px; border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    #btn-search { background: var(--white); color: #0d0d0d; border-color: var(--white); }
    #btn-search:hover { background: var(--accent); }
    #btn-export { background: transparent; color: var(--text); }
    #btn-export:hover { background: var(--border); }
    #btn-export.loading { opacity: 0.5; pointer-events: none; }

    /* ── Tabs ── */
    #tabs {
      display: flex; gap: 0; overflow-x: auto; flex-shrink: 0;
      border-bottom: 1px solid var(--border); padding: 0 12px;
      scrollbar-width: none;
    }
    #tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 10px 14px; font-size: 11px; font-weight: 600; white-space: nowrap;
      color: var(--sub); cursor: pointer; border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: var(--white); border-bottom-color: var(--white); }
    .tab .badge {
      display: inline-block; margin-left: 5px; padding: 1px 5px;
      background: var(--border); border-radius: 10px; font-size: 9px; color: var(--sub);
    }
    .tab.available .badge { background: #2e2e2e; color: var(--accent); }

    /* ── Route list ── */
    #route-list { flex: 1; overflow-y: auto; padding: 0; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    .route-card {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.12s;
    }
    .route-card:hover    { background: rgba(255,255,255,0.03); }
    .route-card.selected { background: rgba(255,255,255,0.06); border-left: 3px solid var(--white); padding-left: 13px; }

    .route-card .rh { display: flex; justify-content: space-between; align-items: flex-start; }
    .route-card .rtitle { font-size: 13px; font-weight: 700; color: var(--white); }
    .route-card .rmeta  { font-size: 11px; color: var(--sub); margin-top: 3px; }
    .route-card .rpills { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .pill {
      padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: 600;
      background: var(--border); color: var(--sub);
    }

    .steps-list { margin-top: 10px; display: flex; flex-direction: column; gap: 0; }
    .step-row {
      display: grid; grid-template-columns: 20px 1fr auto;
      gap: 8px; padding: 6px 0; border-top: 1px solid var(--border); align-items: start;
    }
    .step-num {
      width: 18px; height: 18px; border-radius: 50%; background: var(--border);
      font-size: 9px; font-weight: 700; color: var(--sub);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .step-body { font-size: 11px; color: var(--text); line-height: 1.4; }
    .step-transit { font-size: 10px; color: var(--sub); margin-top: 2px; }
    .step-dur { font-size: 10px; color: var(--muted); white-space: nowrap; text-align: right; }

    /* ── Map ── */
    #map { flex: 1; }

    /* ── Status ── */
    #status {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 10px 18px; font-size: 12px; color: var(--text);
      pointer-events: none; opacity: 0; transition: opacity 0.2s;
      white-space: nowrap; z-index: 10;
    }
    #status.show { opacity: 1; }

    .unavailable-msg { padding: 20px 16px; font-size: 12px; color: var(--muted); text-align: center; }

    #placeholder {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; padding: 24px; text-align: center;
    }
    #placeholder svg { opacity: 0.15; }
    #placeholder p { font-size: 12px; color: var(--sub); max-width: 200px; line-height: 1.6; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px; border: 2px solid var(--border);
      border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite;
      display: inline-block; vertical-align: middle; margin-right: 6px;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
<div id="app">

  <div id="sidebar">
    <div id="sidebar-header">
      <h1>Route Navigator</h1>
      <p>AI-powered multi-mode transit planner</p>
      <form id="query-form" onsubmit="handleSearch(event)">
        <input id="query-input" type="text" placeholder="e.g. Mumbai to Pune by transit" autocomplete="off" />
        <div id="form-row">
          <button id="btn-search" class="btn" type="submit">Search Routes</button>
          <button id="btn-export" class="btn" type="button" onclick="handleExport()">Export PDF</button>
        </div>
      </form>
    </div>

    <div id="tabs" style="display:none;"></div>
    <div id="route-list"><div id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
        <path d="M2 12h20"/>
      </svg>
      <p>Enter a travel query to see routes for all transit modes</p>
    </div></div>
  </div>

  <div id="map"></div>
</div>
<div id="status"></div>

<script>
  let map, directionsService, renderers = [];
  let routeData = null, activeMode = 0, activeRoute = 0;
  let mapsApiKey = '';
  const PALETTE = ['#e8e8e8', '#aaaaaa', '#777777', '#444444', '#ffffff'];

  async function initMap() {
    const cfg = await fetch('/config').then(r => r.json()).catch(() => ({}));
    mapsApiKey = cfg.maps_key || '';
    await loadMapsScript(mapsApiKey);
  }

  function loadMapsScript(key) {
    return new Promise(resolve => {
      if (window.google) { resolve(); return; }
      window._mapsReady = resolve;
      const s = document.createElement('script');
      s.src = `https://maps.googleapis.com/maps/api/js?key=${key}&callback=_mapsReady&libraries=places`;
      s.async = true; document.head.appendChild(s);
    }).then(() => {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 20.5937, lng: 78.9629 }, zoom: 6,
        styles: [
          { elementType: 'geometry', stylers: [{ color: '#1a1a1a' }] },
          { elementType: 'labels.text.stroke', stylers: [{ color: '#0d0d0d' }] },
          { elementType: 'labels.text.fill', stylers: [{ color: '#757575' }] },
          { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#2e2e2e' }] },
          { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#3a3a3a' }] },
          { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#111' }] },
          { featureType: 'poi', stylers: [{ visibility: 'off' }] },
          { featureType: 'transit', elementType: 'geometry', stylers: [{ color: '#2a2a2a' }] },
        ],
        disableDefaultUI: true,
        zoomControl: true,
        zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_CENTER },
      });
      directionsService = new google.maps.DirectionsService();
    });
  }

  async function handleSearch(e) {
    e.preventDefault();
    const query = document.getElementById('query-input').value.trim();
    if (!query) return;
    showStatus('<span class="spinner"></span>Fetching routes…');
    document.getElementById('btn-search').textContent = '…';
    try {
      const res = await fetch('/route', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query }),
      });
      routeData = await res.json();
      activeMode = 0; activeRoute = 0;
      renderTabs();
      renderRouteList();
      drawRoute();
    } catch (err) {
      showStatus('Error: ' + err.message, 3000);
    } finally {
      document.getElementById('btn-search').textContent = 'Search Routes';
      hideStatus();
    }
  }

  async function handleExport() {
    const query = document.getElementById('query-input').value.trim();
    if (!query) return;
    const btn = document.getElementById('btn-export');
    btn.classList.add('loading'); btn.textContent = 'Generating…';
    try {
      const res = await fetch('/route/export', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query }),
      });
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'routes.pdf'; a.click();
      URL.revokeObjectURL(url);
    } catch (err) {
      showStatus('Export failed: ' + err.message, 3000);
    } finally {
      btn.classList.remove('loading'); btn.textContent = 'Export PDF';
    }
  }

  function renderTabs() {
    const el = document.getElementById('tabs');
    el.style.display = 'flex';
    el.innerHTML = routeData.transit_options.map((g, i) => `
      <div class="tab ${g.available ? 'available' : ''} ${i === activeMode ? 'active' : ''}"
           onclick="selectMode(${i})">
        ${g.mode}<span class="badge">${g.routes.length}</span>
      </div>`).join('');
  }

  function selectMode(i) {
    activeMode = i; activeRoute = 0;
    renderTabs(); renderRouteList(); drawRoute();
  }

  function renderRouteList() {
    const list = document.getElementById('route-list');
    const group = routeData.transit_options[activeMode];
    if (!group.available || group.routes.length === 0) {
      list.innerHTML = `<div class="unavailable-msg">No ${group.mode} service available for this journey.</div>`;
      return;
    }
    list.innerHTML = group.routes.map((r, ri) => `
      <div class="route-card ${ri === activeRoute ? 'selected' : ''}" onclick="selectRoute(${ri})">
        <div class="rh">
          <div>
            <div class="rtitle">Route ${r.route_number}</div>
            <div class="rmeta">${r.origin} → ${r.destination}</div>
          </div>
        </div>
        <div class="rpills">
          <span class="pill">🗺 ${r.total_distance}</span>
          <span class="pill">⏱ ${r.total_duration}</span>
          <span class="pill">${r.steps.length} steps</span>
        </div>
        <div class="steps-list">
          ${r.steps.map(s => `
            <div class="step-row">
              <div class="step-num">${s.step_number}</div>
              <div>
                <div class="step-body">${s.instruction}</div>
                ${s.transit_info ? `<div class="step-transit">
                  ${s.transit_info.vehicle_type.toUpperCase()} · ${s.transit_info.line_name}
                  · ${s.transit_info.departure_stop} → ${s.transit_info.arrival_stop}
                  (${s.transit_info.num_stops} stops)</div>` : `<div class="step-transit">${s.travel_mode}</div>`}
              </div>
              <div class="step-dur">${s.distance}<br/><span style="color:var(--muted)">${s.duration}</span></div>
            </div>`).join('')}
        </div>
      </div>`).join('');
  }

  function selectRoute(ri) {
    activeRoute = ri;
    renderRouteList();
    drawRoute();
  }

  function clearRenderers() {
    renderers.forEach(r => r.setMap(null));
    renderers = [];
  }

  function modeToGoogleMode(label) {
    if (label.toLowerCase().includes('driving')) return google.maps.TravelMode.DRIVING;
    if (label.toLowerCase().includes('walk'))    return google.maps.TravelMode.WALKING;
    return google.maps.TravelMode.TRANSIT;
  }

  function modeToTransitMode(label) {
    const l = label.toLowerCase();
    if (l.includes('bus'))    return [google.maps.TransitMode.BUS];
    if (l.includes('metro') || l.includes('subway')) return [google.maps.TransitMode.SUBWAY];
    if (l.includes('train')) return [google.maps.TransitMode.TRAIN];
    if (l.includes('tram'))  return [google.maps.TransitMode.TRAM];
    return undefined;
  }

  function drawRoute() {
    if (!map || !directionsService || !routeData) return;
    clearRenderers();
    const group = routeData.transit_options[activeMode];
    if (!group.available || group.routes.length === 0) return;

    const travelMode = modeToGoogleMode(group.mode);
    const transitModes = modeToTransitMode(group.mode);

    group.routes.forEach((route, ri) => {
      const renderer = new google.maps.DirectionsRenderer({
        map,
        suppressMarkers: ri !== activeRoute,
        polylineOptions: {
          strokeColor: PALETTE[ri % PALETTE.length],
          strokeWeight: ri === activeRoute ? 5 : 2,
          strokeOpacity: ri === activeRoute ? 0.9 : 0.35,
        },
        preserveViewport: ri !== 0,
      });
      renderers.push(renderer);

      const req = {
        origin: routeData.origin,
        destination: routeData.destination,
        travelMode,
        provideRouteAlternatives: true,
      };
      if (transitModes) req.transitOptions = { modes: transitModes };

      directionsService.route(req, (result, status) => {
        if (status === 'OK' && result.routes[ri]) {
          const singleResult = { ...result, routes: [result.routes[ri]] };
          renderer.setDirections(singleResult);
        } else if (status === 'OK' && result.routes[0]) {
          renderer.setDirections(result);
        }
      });
    });
  }

  function showStatus(msg, autoHide) {
    const el = document.getElementById('status');
    el.innerHTML = msg; el.classList.add('show');
    if (autoHide) setTimeout(hideStatus, autoHide);
  }
  function hideStatus() {
    document.getElementById('status').classList.remove('show');
  }

  initMap();
</script>
</body>
</html>
